<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Motive</title>
  <meta name="description" content="The daily-habit app. Small days. Real becoming." />
  <!-- Landing page for the GitHub Pages site. Minimal: brand mark +
       link out to the two legal surfaces App Store Connect needs.
       When the marketing site lands, this gets replaced. -->
  <style>
    :root {
      --bg: #0F0E0C;
      --text: #F2EDE5;
      --muted: rgba(242,237,229,0.65);
      --accent: #C9A35A;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    main {
      padding: 48px 24px;
      max-width: 480px;
    }
    .mark {
      font-size: 48px;
      font-weight: 600;
      letter-spacing: -1.2px;
      margin: 0 0 12px;
    }
    .tagline {
      color: var(--muted);
      font-size: 17px;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .links a {
      color: var(--text);
      text-decoration: none;
      padding: 14px 24px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      font-size: 15px;
      letter-spacing: 0.2px;
    }
    .links a:hover {
      border-color: var(--accent);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #FBF7F0;
        --text: #1A1814;
        --muted: rgba(26,24,20,0.65);
      }
      .links a {
        border-color: rgba(0,0,0,0.14);
      }
    }
  </style>
</head>
<body>
  <main>
    <h1 class="mark">Motive</h1>
    <p class="tagline">Small days. Real becoming.</p>
    <div class="links">
      <a href="./terms.html">Terms of Use</a>
      <a href="./privacy.html">Privacy Policy</a>
    </div>
  </main>
</body>
</html>
